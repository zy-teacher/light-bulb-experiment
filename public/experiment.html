<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>《点亮小灯泡》实验报告单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f0f8ff; padding: 10px; touch-action: manipulation; }
        .container { display: flex; gap: 10px; width: 100%; height: calc(100vh - 20px); }
        .tool-column { width: 170px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }
        .tool-box, .draw-tools, .op-tools { background: #e6f7ff; border: 2px solid #1890ff; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .tool-title { text-align: center; color: #0056b3; font-size: 15px; font-weight: bold; margin-bottom: 2px; border-bottom: 1px dashed #1890ff; padding-bottom: 5px; }
        .component-grid { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 8px; }
        .component { width: 65px; height: 65px; border: 2px solid #ffc107; border-radius: 8px; background: white; cursor: grab; object-fit: contain; padding: 2px; touch-action: none; -webkit-touch-callout: none; user-select: none; }
        .btn-row { display: flex; gap: 5px; }
        .btn-row .btn { flex: 1; padding: 6px 2px; font-size: 13px; }
        .canvas-box { flex: 1; background: white; border: 2px solid #1890ff; border-radius: 10px; position: relative; overflow: hidden; }
        #canvas { width: 100%; height: 100%; background: white; cursor: default; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }
        .control-box { width: 180px; background: #e6f7ff; border: 2px solid #1890ff; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 14px; color: #0056b3; font-weight: bold; }
        .input-group input { padding: 8px; border: 1px solid #1890ff; border-radius: 5px; font-size: 14px; }
        .btn { padding: 8px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px;}
        .btn-primary { background: #1890ff; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-purple { background: #6f42c1; color: white; } /* 智慧问答按钮颜色 */
        .status, .lock-status { text-align: center; font-size: 12px; color: #0056b3; padding: 5px; border-radius: 5px; background: white; border: 1px solid #1890ff; }
        .submit-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(40, 167, 69, 0.9); color: white; padding: 20px 40px; border-radius: 10px; font-size: 18px; display: none; z-index: 9999; }

        /* ======== 弹窗公用样式 ======== */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #f0f8ff; width: 95%; max-width: 1000px; height: 90%; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-header { padding: 15px 20px; background: #1890ff; color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; margin: 0; }
        .close-btn { background: transparent; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1; }
        
        /* 班级汇总特有样式 */
        .modal-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; justify-content: center; }
        .report-card { background: white; width: calc(50% - 15px); min-width: 300px; border: 2px solid #1890ff; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .report-card h4 { color: #0056b3; font-size: 16px; margin: 0; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .report-card img { width: 100%; border: 1px solid #eee; border-radius: 5px; object-fit: contain; background: #fafafa; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .like-btn { background: #ffc107; color: #333; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .like-btn.liked { background: #ff4d4f; color: white; }

        /* ======== 智慧问答专属样式 ======== */
        .chat-modal-content { width: 90%; max-width: 600px; height: 80%; }
        .chat-header { background: #6f42c1; }
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        .chat-msg { padding: 12px 16px; border-radius: 10px; max-width: 85%; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .ai-msg { align-self: flex-start; background: #e6f7ff; border: 1px solid #1890ff; color: #333; border-bottom-left-radius: 2px; }
        .user-msg { align-self: flex-end; background: #6f42c1; color: white; border-bottom-right-radius: 2px; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        .chat-input-area input:focus { border-color: #6f42c1; }
        .typing-indicator { font-size: 13px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tool-column">
            <div class="tool-box">
                <div class="tool-title">元件库</div>
                <div class="component-grid">
                    <img class="component" draggable="true" data-type="battery" src="battery.jpg" title="电池">
                    <img class="component" draggable="true" data-type="bulb_dark" src="bulb_dark.jpg" title="暗灯泡">
                    <img class="component" draggable="true" data-type="bulb_light" src="bulb_light.jpg" title="亮灯泡">
                </div>
            </div>
            <div class="draw-tools">
                <div class="tool-title">绘图工具</div>
                <button class="btn btn-info" onclick="setDrawMode('select')">🖱️ 鼠标选定</button>
                <button class="btn btn-success" onclick="setDrawMode('draw')">🖌️ 导线画笔</button>
                <button class="btn btn-warning" onclick="setDrawMode('erase')">🧽 橡皮擦</button>
                <div class="status" id="drawStatus">当前：鼠标选定</div>
            </div>
            <div class="op-tools">
                <div class="tool-title">元件操作</div>
                <button class="btn btn-warning" onclick="rotateSelectedElement()">🔄 旋转</button>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="scaleSelectedElement(1.1)">🔍 放大</button>
                    <button class="btn btn-primary" onclick="scaleSelectedElement(0.9)">🔍 缩小</button>
                </div>
                <button class="btn btn-danger" onclick="deleteSelectedElement()">🗑️ 删除选中</button>
                <div class="tool-title" style="margin-top: 5px;">锁定工具</div>
                <div class="btn-row">
                    <button class="btn btn-info" onclick="lockSelectedElement()">🔒 锁定</button>
                    <button class="btn btn-warning" onclick="unlockSelectedElement()">🔓 解锁</button>
                </div>
                <div class="lock-status" id="lockStatus">当前：无选中元件</div>
            </div>
        </div>

        <div class="canvas-box">
            <canvas id="canvas"></canvas>
        </div>

        <div class="control-box">
            <div class="tool-title" style="font-size: 16px;">《点亮小灯泡》实验单</div>
            <div class="input-group">
                <label>班级</label>
                <input type="text" id="className" placeholder="请输入班级">
            </div>
            <div class="input-group">
                <label>小组</label>
                <input type="text" id="groupName" placeholder="请输入小组">
            </div>
            <div class="input-group">
                <label>姓名</label>
                <input type="text" id="studentName" placeholder="请输入姓名">
            </div>
            <div class="input-group">
                <label>学号</label>
                <input type="text" id="studentId" placeholder="请输入学号">
            </div>

            <div class="tool-title" style="margin-top: 10px;">实验结果</div>
            <button class="btn btn-primary" onclick="addMark(true)">✅ 点亮</button>
            <button class="btn btn-warning" onclick="addMark(false)">❌ 未点亮</button>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-purple" onclick="openChatModal()">🤖 正正老师</button>
                <button class="btn btn-info" onclick="openSummaryModal()">📊 班级汇总</button>
                <button class="btn btn-danger" onclick="clearCanvas()">🗑️ 清空画布</button>
                <button class="btn btn-success" onclick="submitReport()">📤 提交报告单</button>
            </div>
        </div>
    </div>

    <div class="submit-toast" id="submitToast">提交成功！</div>

    <div class="modal-overlay" id="summaryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 班级汇总 (互相学习与交流)</h2>
                <button class="close-btn" onclick="closeSummaryModal()">×</button>
            </div>
            <div class="modal-body" id="summaryBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="chatModal">
        <div class="modal-content chat-modal-content">
            <div class="modal-header chat-header">
                <h2>🤖 正正老师</h2>
                <button class="close-btn" onclick="closeChatModal()">×</button>
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="chat-msg ai-msg">
                    你好小科学家！👋 我是正正老师。<br>在“点亮小灯泡”实验中遇到了什么麻烦吗？比如不知如何连线、灯泡为什么不亮，随时可以问我哦！
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="输入你想问的问题，按回车键发送..." onkeypress="handleChatKeyPress(event)">
                <button class="btn btn-purple" style="width: 80px;" onclick="sendChatMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ... (此处保留了原本所有的画布、拖拽、班级汇总的 JS 逻辑，完全没有修改) ...
        const imgAssets = { battery: new Image(), bulb_dark: new Image(), bulb_light: new Image() };
        imgAssets.battery.src = 'battery.jpg'; imgAssets.bulb_dark.src = 'bulb_dark.jpg'; imgAssets.bulb_light.src = 'bulb_light.jpg';
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let elements = [], drawLines = [], currentLine = [], isDragging = false, dragTarget = null, selectedElement = null, dragOffset = { x: 0, y: 0 }, drawMode = 'select', canvasWidth, canvasHeight;
        const likedReports = JSON.parse(localStorage.getItem('likedReports') || '[]');

        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        function resizeCanvas() { const box = document.querySelector('.canvas-box'); canvas.width = box.clientWidth; canvas.height = box.clientHeight; canvasWidth = canvas.width; canvasHeight = canvas.height; redraw(); }
        function updateLockStatus() { document.getElementById('lockStatus').textContent = !selectedElement ? '当前：无选中元件' : (selectedElement.locked ? '当前：已锁定' : '当前：未锁定'); }
        function lockSelectedElement() { if (selectedElement && selectedElement.type !== 'mark') { selectedElement.locked = true; updateLockStatus(); redraw(); } }
        function unlockSelectedElement() { if (selectedElement) { selectedElement.locked = false; updateLockStatus(); redraw(); } }

        const components = document.querySelectorAll('.component'); let touchGhost = null; 
        components.forEach(comp => {
            comp.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', e.target.dataset.type); });
            comp.addEventListener('touchstart', (e) => {
                if (e.cancelable) e.preventDefault(); const touch = e.touches[0];
                touchGhost = document.createElement('img'); touchGhost.src = e.target.src; touchGhost.style.position = 'fixed'; touchGhost.style.width = '65px'; touchGhost.style.height = '65px'; touchGhost.style.opacity = '0.8'; touchGhost.style.pointerEvents = 'none'; touchGhost.style.zIndex = '9999';
                touchGhost.style.left = (touch.clientX - 32.5) + 'px'; touchGhost.style.top = (touch.clientY - 32.5) + 'px'; touchGhost.dataset.type = e.target.dataset.type; document.body.appendChild(touchGhost);
            }, { passive: false });
            comp.addEventListener('touchmove', (e) => { if (!touchGhost) return; if (e.cancelable) e.preventDefault(); const touch = e.touches[0]; touchGhost.style.left = (touch.clientX - 32.5) + 'px'; touchGhost.style.top = (touch.clientY - 32.5) + 'px'; }, { passive: false });
            comp.addEventListener('touchend', (e) => {
                if (!touchGhost) return; const touch = e.changedTouches[0]; const type = touchGhost.dataset.type; document.body.removeChild(touchGhost); touchGhost = null;
                const rect = canvas.getBoundingClientRect(); if (touch.clientX >= rect.left && touch.clientX <= rect.right && touch.clientY >= rect.top && touch.clientY <= rect.bottom) { elements.push({ id: Date.now() + Math.random(), type: type, x: touch.clientX - rect.left, y: touch.clientY - rect.top, size: 80, rotation: 0, scale: 1.5, locked: false }); redraw(); }
            });
        });
        canvas.addEventListener('dragover', (e) => e.preventDefault());
        canvas.addEventListener('drop', (e) => { e.preventDefault(); const type = e.dataTransfer.getData('text/plain'); if (!type) return; const rect = canvas.getBoundingClientRect(); elements.push({ id: Date.now() + Math.random(), type, x: e.clientX - rect.left, y: e.clientY - rect.top, size: 80, rotation: 0, scale: 1.5, locked: false }); redraw(); });

        canvas.addEventListener('mousedown', startDrag); canvas.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); startDrag({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }, true); }, { passive: false });
        canvas.addEventListener('mousemove', dragMove); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); dragMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }, true); });
        canvas.addEventListener('mouseup', endDrag); canvas.addEventListener('touchend', endDrag); canvas.addEventListener('mouseleave', endDrag);

        function startDrag(e, isTouch = false) {
            const rect = canvas.getBoundingClientRect(); const x = isTouch ? e.clientX - rect.left : e.offsetX; const y = isTouch ? e.clientY - rect.top : e.offsetY;
            if (drawMode === 'select') {
                selectedElement = null;
                for (let i = elements.length - 1; i >= 0; i--) {
                    const item = elements[i], half = (item.size * item.scale) / 2;
                    if (x >= item.x - half && x <= item.x + half && y >= item.y - half && y <= item.y + half) {
                        if (item.locked) { selectedElement = item; updateLockStatus(); redraw(); return; }
                        isDragging = true; dragTarget = item; selectedElement = item; dragOffset = { x: x - item.x, y: y - item.y }; updateLockStatus(); redraw(); return;
                    }
                }
                updateLockStatus(); redraw();
            } else {
                selectedElement = null; updateLockStatus(); redraw();
                if (drawMode === 'draw') { currentLine = [{ x, y }]; if (isTouch) canvas.addEventListener('touchmove', drawLineTouch, {passive: false}); else canvas.addEventListener('mousemove', drawLine); }
                else if (drawMode === 'erase') { eraseAt(x, y); if (isTouch) canvas.addEventListener('touchmove', eraseMoveTouch, {passive: false}); else canvas.addEventListener('mousemove', eraseMove); }
            }
        }
        function dragMove(e, isTouch = false) { if (!isDragging || !dragTarget) return; const rect = canvas.getBoundingClientRect(); dragTarget.x = (isTouch ? e.clientX - rect.left : e.offsetX) - dragOffset.x; dragTarget.y = (isTouch ? e.clientY - rect.top : e.offsetY) - dragOffset.y; redraw(); }
        function endDrag() { isDragging = false; canvas.removeEventListener('mousemove', drawLine); canvas.removeEventListener('touchmove', drawLineTouch); canvas.removeEventListener('mousemove', eraseMove); canvas.removeEventListener('touchmove', eraseMoveTouch); if (currentLine.length > 0) { drawLines.push(currentLine); currentLine = []; } }
        function rotateSelectedElement() { if (selectedElement && !selectedElement.locked) { selectedElement.rotation = (selectedElement.rotation || 0) + 45; redraw(); } }
        function scaleSelectedElement(f) { if (selectedElement && !selectedElement.locked) { selectedElement.scale = Math.max(0.5, Math.min(3, (selectedElement.scale || 1) * f)); redraw(); } }
        function deleteSelectedElement() { if (selectedElement && !selectedElement.locked) { elements = elements.filter(i => i.id !== selectedElement.id); selectedElement = null; updateLockStatus(); redraw(); } }
        function drawLine(e) { currentLine.push({ x: e.offsetX, y: e.offsetY }); redraw(); }
        function drawLineTouch(e) { if(e.cancelable) e.preventDefault(); const rect = canvas.getBoundingClientRect(); currentLine.push({ x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top }); redraw(); }
        function eraseAt(x, y, r = 15) { const nextLines = []; drawLines.forEach(line => { let current = []; line.forEach(p => { if (Math.sqrt((p.x - x)**2 + (p.y - y)**2) > r) current.push(p); else { if (current.length > 0) nextLines.push(current); current = []; } }); if (current.length > 0) nextLines.push(current); }); drawLines = nextLines; redraw(); }
        function eraseMove(e) { eraseAt(e.offsetX, e.offsetY); }
        function eraseMoveTouch(e) { if(e.cancelable) e.preventDefault(); const rect = canvas.getBoundingClientRect(); eraseAt(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); }
        function setDrawMode(m) { drawMode = m; let text = '鼠标选定', cursor = 'default'; if (m === 'draw') { text = '导线画笔'; cursor = 'crosshair'; } else if (m === 'erase') { text = '橡皮擦'; cursor = 'cell'; } document.getElementById('drawStatus').textContent = `当前：${text}`; canvas.style.cursor = cursor; }
        function addMark(s) { elements = elements.filter(i => i.type !== 'mark'); elements.push({ id: Date.now(), type: 'mark', x: canvasWidth / 2, y: canvasHeight / 2, size: 40, rotation: 0, scale: 1, locked: false, success: s }); redraw(); }
        function clearCanvas() { elements = []; drawLines = []; currentLine = []; selectedElement = null; updateLockStatus(); redraw(); }
        
        async function openSummaryModal() {
            document.getElementById('summaryModal').style.display = 'flex';
            const body = document.getElementById('summaryBody');
            body.innerHTML = '<div style="text-align:center; width:100%; color:#666; padding:40px; font-size:18px;">正在加载大家的作品，请稍候...</div>';
            try { const response = await fetch('/api/get-all-reports-full'); const result = await response.json(); if (result.success) renderSummary(result.data); else body.innerHTML = '<div style="text-align:center; width:100%; color:#dc3545;">加载失败，请重试</div>'; } 
            catch (error) { body.innerHTML = '<div style="text-align:center; width:100%; color:#dc3545;">网络错误，请联系老师检查服务器</div>'; }
        }
        function closeSummaryModal() { document.getElementById('summaryModal').style.display = 'none'; }
        function renderSummary(reports) {
            const body = document.getElementById('summaryBody');
            if (!reports || reports.length === 0) {
                body.innerHTML = '<div style="text-align:center; width:100%; color:#666; padding:40px; font-size:18px;">暂无同学提交报告，快去抢首发吧！</div>';
                return;
            }

            reports.sort((a, b) => b.id - a.id); // 按最新时间倒序

            body.innerHTML = reports.map(r => {
                const isLiked = likedReports.includes(r.id);
                const resultText = r.result ? '<span style="color:#28a745">✅ 成功点亮</span>' : '<span style="color:#dc3545">❌ 未点亮</span>';
                
                // 【新增】：判断如果有教师点评，就生成一个浅蓝色的点评框
                const commentHtml = r.comment ? 
                    `<div style="margin-top: 8px; padding: 8px; background: #e6f7ff; border-left: 3px solid #1890ff; font-size: 13px; color: #333; border-radius: 3px; word-break: break-all;">
                        <strong>老师点评：</strong>${r.comment}
                    </div>` : '';
                
                return `
                    <div class="report-card">
                        <h4>👩‍🎓 ${r.studentName || '未知姓名'}(${r.studentId || '未知学号'})</h4>
                        <div style="font-size:12px; color:#666;">班级: ${r.className || '未知'} | 结果: ${resultText} | 时间: ${r.submitTime}</div>
                        <img src="${r.imageData}" alt="报告单预览">
                        
                        ${commentHtml} 

                        <div class="card-footer" style="margin-top: 10px;">
                            <span id="like-count-${r.id}" style="font-weight:bold; color:#ff4d4f; font-size: 15px;">❤️ ${r.likes || 0} 赞</span>
                            <button class="like-btn ${isLiked ? 'liked' : ''}" 
                                    id="like-btn-${r.id}"
                                    onclick="likeReport('${r.id}')" 
                                    ${isLiked ? 'disabled' : ''}>
                                ${isLiked ? '已赞' : '👍 赞一个'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        async function likeReport(reportId) {
            if (likedReports.includes(reportId)) return;
            try { const response = await fetch(`/api/like-report/${reportId}`, { method: 'POST' }); const result = await response.json(); if (result.success) { document.getElementById(`like-count-${reportId}`).textContent = `❤️ ${result.likes} 赞`; const btn = document.getElementById(`like-btn-${reportId}`); btn.classList.add('liked'); btn.textContent = '已赞'; btn.disabled = true; likedReports.push(reportId); localStorage.setItem('likedReports', JSON.stringify(likedReports)); } } 
            catch (error) { alert('点赞失败，请检查网络！'); }
        }
        async function submitReport() {
            const sid = document.getElementById('studentId').value.trim(); const sname = document.getElementById('studentName').value.trim(); const cname = document.getElementById('className').value.trim();
            if (!sid || !sname || !cname) return alert('请填完整信息后再提交！'); const mark = elements.find(i => i.type === 'mark'); if (!mark) return alert('请先点击实验结果标记！');
            redraw(); const data = { id: Date.now().toString(), studentId: sid, studentName: sname, className: cname, groupName: document.getElementById('groupName').value.trim() || '未填写', imageData: canvas.toDataURL('image/png'), submitTime: new Date().toLocaleString(), result: mark.success };
            try { const res = await fetch('/api/submit-report', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); const result = await res.json(); if (result.success) { const toast = document.getElementById('submitToast'); toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; clearCanvas(); document.getElementById('className').value = ''; document.getElementById('groupName').value = ''; document.getElementById('studentName').value = ''; document.getElementById('studentId').value = ''; redraw(); }, 1000); } } 
            catch (e) { alert('提交失败！'); }
        }
        function redraw() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight); const info = `${document.getElementById('className').value} | ${document.getElementById('groupName').value} | ${document.getElementById('studentName').value} | ${document.getElementById('studentId').value}`; ctx.font = '16px Microsoft YaHei'; ctx.fillStyle = '#1890ff'; ctx.fillText(info, 20, 30);
            elements.forEach(item => {
                ctx.save(); ctx.translate(item.x, item.y); ctx.rotate(item.rotation * Math.PI / 180); ctx.scale(item.scale, item.scale); const size = 80, half = size / 2;
                if (item.type === 'battery') ctx.drawImage(imgAssets.battery, -half, -half, size, size); else if (item.type.startsWith('bulb')) ctx.drawImage(item.type === 'bulb_dark' ? imgAssets.bulb_dark : imgAssets.bulb_light, -half, -half, size, size); else if (item.type === 'mark') { ctx.font = '40px Arial'; ctx.fillStyle = item.success ? '#28a745' : '#dc3545'; ctx.fillText(item.success ? '✓' : '✗', -20, 10); } ctx.restore();
                if (item.locked && item.type !== 'mark') { ctx.fillStyle = '#dc3545'; ctx.beginPath(); ctx.arc(item.x + half*item.scale, item.y - half*item.scale, 10, 0, 2*Math.PI); ctx.fill(); ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🔒', item.x + half*item.scale, item.y - half*item.scale); }
                if (selectedElement && selectedElement.id === item.id) { ctx.strokeStyle = '#1890ff'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); const b = (item.type === 'mark' ? 40 : size) * item.scale; ctx.strokeRect(item.x - b/2, item.y - b/2, b, b); ctx.setLineDash([]); }
            });
            ctx.lineWidth = 4; ctx.strokeStyle = '#dc3545'; drawLines.concat([currentLine]).forEach(line => { if (line.length < 2) return; ctx.beginPath(); ctx.moveTo(line[0].x, line[0].y); for (let i = 1; i < line.length; i++) ctx.lineTo(line[i].x, line[i].y); ctx.stroke(); });
        }
        document.querySelectorAll('input').forEach(i => i.addEventListener('input', redraw));


        // ==========================================
        // 【新增】智慧问答前端交互逻辑
        // ==========================================
        
        function openChatModal() {
            document.getElementById('chatModal').style.display = 'flex';
            setTimeout(() => document.getElementById('chatInput').focus(), 100);
        }

        function closeChatModal() {
            document.getElementById('chatModal').style.display = 'none';
        }

        // 绑定回车发送
        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        async function sendChatMessage() {
            const inputEl = document.getElementById('chatInput');
            const message = inputEl.value.trim();
            if (!message) return;

            const historyEl = document.getElementById('chatHistory');

            // 1. 在界面上渲染学生发出的问题
            historyEl.innerHTML += `<div class="chat-msg user-msg">${message}</div>`;
            inputEl.value = ''; // 清空输入框
            historyEl.scrollTop = historyEl.scrollHeight; // 自动滚到底部

            // 2. 在界面上渲染一个“思考中...”的占位气泡
            const tempId = 'msg-' + Date.now();
            historyEl.innerHTML += `<div id="${tempId}" class="chat-msg ai-msg typing-indicator">思考中...</div>`;
            historyEl.scrollTop = historyEl.scrollHeight;

            // 3. 向你的本地服务器发请求（服务器去调用 DeepSeek 接口）
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const result = await response.json();
                
                // 移除“思考中...”
                document.getElementById(tempId).remove();

                if (result.success) {
                    // 渲染 AI 的回答 (支持文本换行符转换)
                    const formattedReply = result.reply.replace(/\n/g, '<br>');
                    historyEl.innerHTML += `<div class="chat-msg ai-msg">${formattedReply}</div>`;
                } else {
                    historyEl.innerHTML += `<div class="chat-msg ai-msg" style="color:red;">哎呀，助手遇到了一点小麻烦：${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById(tempId).remove();
                historyEl.innerHTML += `<div class="chat-msg ai-msg" style="color:red;">网络似乎断开了，请稍后再试一次哦！</div>`;
            }
            
            historyEl.scrollTop = historyEl.scrollHeight;
        }

    </script>
</body>
</html>
